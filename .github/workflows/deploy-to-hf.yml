name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  deploy-to-hugging-face:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install git-lfs and rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs rsync
          git lfs install

      - name: Clone Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/qyam23/ats-resume-analyzer hf_space

      - name: Sync repository files to Hugging Face Space
        run: |
          rm -f hf_space/.local_settings.json hf_space/.env
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".venv" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude ".playwright-cli" \
            --exclude ".streamlit" \
            --exclude "hf_space" \
            --exclude "temp" \
            --exclude "reports/generated" \
            --exclude ".env" \
            --exclude ".local_settings.json" \
            ./ hf_space/

      - name: Commit and push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        working-directory: hf_space
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi
          git commit -m "Deploy from GitHub Actions"
          git push https://user:${HF_TOKEN}@huggingface.co/spaces/qyam23/ats-resume-analyzer main
